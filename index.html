<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhimanyu Learning Space | SFI IMSc</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f1f5f9;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .hero-bg {
            background: linear-gradient(rgba(136, 8, 8, 0.9), rgba(20, 20, 20, 0.95)), 
                        url('https://github.com/Com-Adarsh/library-sheet/blob/main/cusat.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="app">
    <header class="hero-bg text-white pt-12 pb-16 shadow-2xl">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <div class="flex justify-center items-center gap-6 mb-6">
                <img src="https://raw.githubusercontent.com/Com-Adarsh/library-sheet/main/abhimanyu.png" class="h-20 w-20 rounded-full border-4 border-white/20 shadow-2xl bg-white">
                <img src="https://raw.githubusercontent.com/Com-Adarsh/library-sheet/main/sfi%20imsc%20logo.png" class="h-20 w-20 rounded-full border-4 border-white/20 shadow-2xl bg-white">
            </div>
            <h1 class="text-3xl md:text-5xl font-extrabold tracking-tighter uppercase mb-2">ABHIMANYU LEARNING SPACE</h1>
            <p class="text-sm md:text-lg text-red-100 font-bold opacity-80">SFI IMSc DIGITAL LIBRARY</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 -mt-8 pb-24">
        <div class="glass-card rounded-2xl shadow-xl mb-6">
            <input v-model="searchQuery" type="text" placeholder="Search for textbooks, subjects, or notes..." 
                   class="w-full bg-transparent p-5 outline-none text-lg font-medium">
        </div>

        <div class="flex gap-2 overflow-x-auto pb-6 no-scrollbar">
            <button @click="semFilter = 'All'" :class="semClass(semFilter === 'All', 'All')">All</button>
            <button v-for="n in 10" :key="n" @click="semFilter = n.toString()" :class="semClass(semFilter === n.toString(), n)">
                S{{ n }}
            </button>
        </div>

        <div v-if="loading" class="text-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-red-700 mx-auto"></div>
            <p class="mt-4 text-slate-500 font-bold italic uppercase tracking-widest text-xs">Syncing Database...</p>
        </div>

        <div v-else class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div v-for="item in filteredResources" :key="item.Title"
                 class="glass-card rounded-3xl p-6 shadow-sm hover:shadow-2xl transition-all border-t-8"
                 :style="{ borderColor: getSemColor(item.Semester) }">
                
                <div class="flex justify-between items-start mb-4">
                    <span class="text-[10px] font-black px-3 py-1 rounded-full uppercase text-white shadow-sm"
                          :style="{ backgroundColor: getSemColor(item.Semester) }">
                        Semester {{ item.Semester }}
                    </span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{{ item.Type }}</span>
                </div>
                
                <h3 class="text-xl font-extrabold text-slate-800 leading-tight mb-6">
                    {{ item.Title }}
                </h3>

                <a :href="item.Link" target="_blank" 
                   class="inline-flex items-center gap-2 font-black text-sm tracking-tighter transition-all hover:gap-3"
                   :style="{ color: getSemColor(item.Semester) }">
                    ACCESS DOCUMENT
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </a>
            </div>
        </div>
    </main>

    <button @click="showUpload = true" 
            class="fixed bottom-8 right-8 bg-red-700 text-white px-6 py-4 rounded-2xl shadow-2xl hover:scale-105 transition-all z-50 flex items-center gap-3 font-bold uppercase tracking-tighter">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        Contribute
    </button>

    <div v-if="showUpload" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl max-w-md w-full p-8 shadow-2xl relative">
            <button @click="showUpload = false" class="absolute top-6 right-6 text-2xl font-bold text-slate-400">&times;</button>
            <h2 class="text-2xl font-black text-slate-900 mb-2 uppercase italic tracking-tighter">New Contribution</h2>
            <p class="text-slate-500 text-xs mb-6 font-bold uppercase">Submitted files are reviewed by the Subcommittee.</p>
            
            <form @submit.prevent="submitForm" class="space-y-4">
                <input v-model="newEntry.title" type="text" required placeholder="Resource Title (e.g. Statistics Notes)" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-4 outline-none focus:border-red-600">
                <div class="grid grid-cols-2 gap-4">
                    <select v-model="newEntry.semester" class="bg-slate-50 border-2 border-slate-100 rounded-xl p-4 outline-none">
                        <option v-for="n in 10" :value="n">Sem {{ n }}</option>
                    </select>
                    <select v-model="newEntry.type" class="bg-slate-50 border-2 border-slate-100 rounded-xl p-4 outline-none">
                        <option>Notes</option>
                        <option>PYQ</option>
                        <option>Textbook</option>
                    </select>
                </div>
                <input v-model="newEntry.link" type="url" required placeholder="Google Drive Link" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-4 outline-none focus:border-red-600">
                <button type="submit" :disabled="uploading" class="w-full bg-red-700 text-white font-black py-4 rounded-xl hover:bg-slate-900 transition-colors shadow-xl">
                    {{ uploading ? 'UPLOADING...' : 'SUBMIT FOR REVIEW' }}
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSKlLQMEpcnLtAEpyjG85WjHNWPeKP2er_baGRjtjxsAUjFo7z7gu5aahKpmh0FN9O0nYtIh1dpQTq/pub?output=csv';
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyoitEj7xr467FGlaQMKl1woZz8CCneBxfriaBlPB5MHYSSvUH0yt9WSmkIibbBg_Ai/exec';

    createApp({
        data() {
            return {
                semFilter: 'All',
                searchQuery: '',
                resources: [],
                loading: true,
                showUpload: false,
                uploading: false,
                newEntry: { title: '', semester: 1, type: 'Notes', link: '' }
            }
        },
        computed: {
            filteredResources() {
                // Defensive filtering to prevent "Line 27" errors
                return this.resources.filter(r => {
                    if (!r) return false;
                    
                    const title = (r.Title ?? r.title ?? "").toString().toLowerCase();
                    const semester = (r.Semester ?? r.semester ?? "").toString().trim();
                    const type = (r.Type ?? r.type ?? "").toString().toLowerCase();
                    const query = this.searchQuery.toLowerCase();

                    const matchesSem = this.semFilter === 'All' || semester === this.semFilter;
                    const matchesSearch = title.includes(query) || type.includes(query);

                    return matchesSem && matchesSearch;
                });
            }
        },
        methods: {
            getSemColor(sem) {
                const s = parseInt(sem);
                if (s <= 2) return '#0f172a'; // Navy
                if (s <= 4) return '#880808'; // Crimson
                if (s <= 6) return '#064e3b'; // Green
                if (s <= 8) return '#4c1d95'; // Purple
                return '#78350f'; // Amber
            },
            semClass(active, sem) {
                const base = 'whitespace-nowrap px-6 py-2 rounded-xl text-xs font-black uppercase transition-all border-2 ';
                if (!active) return base + 'bg-white border-slate-200 text-slate-400 hover:border-slate-400';
                return base + 'text-white shadow-lg bg-red-700 border-red-700';
            },
            async submitForm() {
                this.uploading = true;
                try {
                    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(this.newEntry) });
                    alert("Submission successful! Admin will review it soon.");
                    this.showUpload = false;
                    this.newEntry = { title: '', semester: 1, type: 'Notes', link: '' };
                } catch (e) { 
                    alert("Network error. Please check your internet."); 
                } finally { 
                    this.uploading = false; 
                }
            },
            init() {
                Papa.parse(SHEET_URL, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: (res) => {
                        this.resources = res.data.filter(row => row.Title || row.title);
                        this.loading = false;
                    }
                });
            }
        },
        mounted() { this.init(); }
    }).mount('#app')
</script>
</body>
</html>
