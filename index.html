<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhimanyu Learning Space | SFI IMSc CUSAT</title>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Com-Adarsh/library-sheet/main/abhimanyu.png">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .glass-card { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .hero-bg {
            background: linear-gradient(rgba(136, 8, 8, 0.92), rgba(15, 23, 42, 0.95)), 
                        url('https://raw.githubusercontent.com/Com-Adarsh/library-sheet/main/cusat.jpg');
            background-attachment: fixed; background-size: cover; background-position: center;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="antialiased">

<div id="app">
    <header class="hero-bg text-white pt-16 pb-20 shadow-2xl">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <div class="flex justify-center items-center gap-6 mb-8">
                <img src="https://raw.githubusercontent.com/Com-Adarsh/library-sheet/main/abhimanyu.png" class="h-20 w-20 rounded-full border-4 border-white/20 shadow-2xl bg-white p-1">
                <img src="https://raw.githubusercontent.com/Com-Adarsh/library-sheet/main/sfi%20imsc%20logo.png" class="h-20 w-20 rounded-full border-4 border-white/20 shadow-2xl bg-white p-1">
            </div>
            <h1 class="text-4xl md:text-6xl font-extrabold uppercase mb-3">ABHIMANYU LEARNING SPACE</h1>
            <p class="text-sm md:text-xl text-red-100 font-semibold italic">IMSc Digital Library</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 -mt-10 pb-32">
        <div class="glass-card rounded-3xl shadow-2xl p-2 mb-8 flex flex-col md:flex-row items-center gap-2">
            <div class="relative w-full">
                <input v-model="searchQuery" type="text" placeholder="Search resources..." class="w-full bg-transparent p-5 outline-none text-lg font-medium">
            </div>
            <div class="px-8 py-4 bg-slate-900 text-white rounded-2xl font-black text-xs hidden md:block">
                {{ filteredResources.length }} RESULTS
            </div>
        </div>

        <div class="flex gap-3 overflow-x-auto pb-8 no-scrollbar">
            <button @click="semFilter = 'All'" :class="semClass(semFilter === 'All', 'All')">All</button>
            <button v-for="n in 10" :key="n" @click="semFilter = n.toString()" :class="semClass(semFilter === n.toString(), n)">SEM {{ n }}</button>
        </div>

        <div v-if="loading" class="text-center py-24">
            <div class="animate-spin rounded-full h-14 w-14 border-b-4 border-red-700 mx-auto"></div>
        </div>

        <div v-else-if="filteredResources.length === 0" class="text-center py-24 glass-card rounded-3xl">
            <p class="text-slate-400 font-bold uppercase">No resources found.</p>
        </div>

        <div v-else class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div v-for="item in filteredResources" :key="item.uniqueId"
                 class="glass-card rounded-[2.5rem] p-8 card-hover transition-all duration-300 border-t-[10px]"
                 :style="{ borderColor: getSemColor(item.semester) }">
                
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[10px] font-black px-4 py-1.5 rounded-full uppercase text-white" :style="{ backgroundColor: getSemColor(item.semester) }">
                        Sem {{ item.semester }}
                    </span>
                    <span class="text-[11px] font-bold text-slate-400 uppercase">{{ item.type }}</span>
                </div>
                
                <h3 class="text-2xl font-extrabold text-slate-800 leading-tight mb-8 min-h-[4rem]">{{ item.title }}</h3>

                <div class="pt-4 border-t border-slate-100">
                    <a :href="item.link" target="_blank" class="font-black text-sm flex items-center gap-2" :style="{ color: getSemColor(item.semester) }">
                        OPEN RESOURCE →
                    </a>
                </div>
            </div>
        </div>
    </main>

    <button @click="showUpload = true" class="fixed bottom-8 right-8 bg-red-700 text-white px-8 py-5 rounded-3xl shadow-2xl z-50 font-black uppercase text-xs">
        Contribute
    </button>
</div>

<script>
    const { createApp } = Vue;
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSKlLQMEpcnLtAEpyjG85WjHNWPeKP2er_baGRjtjxsAUjFo7z7gu5aahKpmh0FN9O0nYtIh1dpQTq/pub?output=csv';

    createApp({
        data() {
            return {
                semFilter: 'All',
                searchQuery: '',
                resources: [],
                loading: true,
                showUpload: false
            }
        },
        computed: {
            filteredResources() {
                return this.resources.filter(r => {
                    const matchesSem = this.semFilter === 'All' || String(r.semester) === this.semFilter;
                    const matchesSearch = r.title.toLowerCase().includes(this.searchQuery.toLowerCase());
                    return matchesSem && matchesSearch;
                });
            }
        },
        methods: {
            getSemColor(sem) {
                const s = parseInt(sem);
                if (s <= 2) return '#0f172a';
                if (s <= 4) return '#880808';
                if (s <= 6) return '#166534';
                return '#5b21b6';
            },
            semClass(active, sem) {
                const base = 'whitespace-nowrap px-8 py-3 rounded-2xl text-[11px] font-black uppercase border-2 ';
                return active ? base + 'bg-red-700 border-red-700 text-white shadow-xl' : base + 'bg-white border-slate-200 text-slate-500';
            },
            fetchData() {
                Papa.parse(SHEET_URL, {
                    download: true,
                    header: true,
                    skipEmptyLines: 'greedy',
                    complete: (results) => {
                        // THIS SECTION IS THE FIX: It maps any header name (TITLE, Title, title) to a safe lowercase version
                        this.resources = results.data.map((row, index) => {
                            const findValue = (keyName) => {
                                const actualKey = Object.keys(row).find(k => k.trim().toUpperCase() === keyName.toUpperCase());
                                return actualKey ? row[actualKey] : "";
                            };
                            return {
                                uniqueId: index,
                                title: findValue("TITLE"),
                                semester: findValue("SEMESTER"),
                                type: findValue("TYPE"),
                                link: findValue("LINK")
                            };
                        }).filter(r => r.title && r.link); // Only keep rows that actually have content
                        this.loading = false;
                    }
                });
            }
        },
        mounted() { this.fetchData(); }
    }).mount('#app')
</script>
</body>
</html>
