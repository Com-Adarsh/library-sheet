<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhimanyu Learning Space</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50">

<div id="app" class="min-h-screen pb-20">
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <span class="font-bold text-xl text-indigo-700">Abhimanyu</span>
            <div class="relative w-1/2 lg:w-1/3">
                <input v-model="searchQuery" type="text" placeholder="Search materials..." 
                       class="w-full bg-gray-100 border-none rounded-full px-4 py-2 text-sm focus:ring-2 focus:ring-indigo-500">
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 mt-8">
        <div class="flex gap-2 overflow-x-auto pb-4 mb-6 no-scrollbar">
            <button @click="filter = 'All'" :class="btnClass(filter === 'All')">All Materials</button>
            <button v-for="sem in semesters" @click="filter = sem" :class="btnClass(filter === sem)">
                Semester {{ sem }}
            </button>
        </div>

        <div v-if="loading" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-indigo-600"></div>
            <p class="mt-4 text-gray-500 text-sm">Accessing Digital Library...</p>
        </div>

        <div v-else class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div v-for="item in filteredResources" :key="item.Title" 
                 class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow group">
                <div class="flex justify-between items-start mb-3">
                    <span class="text-[10px] font-bold bg-indigo-50 text-indigo-600 px-2.5 py-1 rounded-lg uppercase tracking-wider">
                        Sem {{ item.Semester }}
                    </span>
                    <span class="text-[10px] font-bold bg-gray-100 text-gray-600 px-2.5 py-1 rounded-lg uppercase">
                        {{ item.Type }}
                    </span>
                </div>
                <h3 class="font-semibold text-gray-800 group-hover:text-indigo-700 transition-colors">{{ item.Title }}</h3>
                <a :href="item.Link" target="_blank" 
                   class="mt-4 inline-flex items-center text-sm font-bold text-indigo-600 hover:text-indigo-800">
                    View Resource 
                    <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </a>
            </div>
        </div>
    </main>
</div>

<script>
    const { createApp } = Vue;
    // Replace with your Google Sheets "Published CSV" URL
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSKlLQMEpcnLtAEpyjG85WjHNWPeKP2er_baGRjtjxsAUjFo7z7gu5aahKpmh0FN9O0nYtIh1dpQTq/pub?output=csv';

    createApp({
        data() {
            return {
                filter: 'All',
                searchQuery: '',
                semesters: ['1', '2', '3', '4', '5', '6'],
                resources: [],
                loading: true
            }
        },
        computed: {
            filteredResources() {
                return this.resources.filter(r => {
                    const matchesFilter = this.filter === 'All' || r.Semester.trim() === this.filter;
                    const matchesSearch = r.Title.toLowerCase().includes(this.searchQuery.toLowerCase());
                    return matchesFilter && matchesSearch;
                });
            }
        },
        methods: {
            btnClass(isActive) {
                return isActive 
                    ? 'whitespace-nowrap bg-indigo-600 text-white px-5 py-2 rounded-full text-sm font-semibold shadow-sm' 
                    : 'whitespace-nowrap bg-white border border-gray-200 text-gray-600 px-5 py-2 rounded-full text-sm font-semibold hover:bg-gray-50';
            },
            init() {
                Papa.parse(SHEET_URL, {
                    download: true,
                    header: true,
                    complete: (res) => {
                        this.resources = res.data.filter(row => row.Title && row.Link);
                        this.loading = false;
                    }
                });
            }
        },
        mounted() { this.init(); }
    }).mount('#app')
</script>
</body>
</html>
